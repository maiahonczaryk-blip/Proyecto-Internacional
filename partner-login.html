<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Login | REMAX Inmomás</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="Globo_CMYK.png">
  <style>
    body {
      background: var(--bg-secondary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 3rem;
      border-radius: 1rem;
      box-shadow: var(--shadow-xl);
      max-width: 450px;
      width: 100%;
      text-align: center;
      border-top: 6px solid var(--blue);
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: 1rem;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
    }
    .error-msg {
      color: var(--red);
      margin-bottom: 1rem;
      display: none;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="Logo negro sin fondo .png" alt="REMAX Inmomás" style="height: 50px; margin: 0 auto 2rem auto; display: block;">
    
    <h2 style="font-weight: 700; color: var(--blue); margin-bottom: 0.5rem;">Partner Portal Login</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Enter your registered email to access your dashboard.</p>
    
    <div id="error-message" class="error-msg">Email not found or application is still pending approval.</div>

    <form id="partner-login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="realtor@agency.com">
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; background-color: var(--blue); border: none; box-shadow: var(--shadow-md);">Access Dashboard</button>
    </form>
    
    <div style="margin-top: 1.5rem; font-size: 0.9rem;">
      <a href="professionals.html" style="color: var(--blue); text-decoration: underline;">Apply for Access</a>
    </div>
  </div>

  <script>
    if (window.location.pathname.endsWith('partner-login.html')) {
      window.location.href = 'index.html#login';
    }
  </script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('partner-login-form').addEventListener('submit', loginPartner);
  </script>
</body>
</html>
