<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | REMAX Inmomás</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="Globo_CMYK.png">
  <style>
    body {
      background: #f3f4f6;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .admin-header {
      background: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    }
    .admin-header img {
      height: 40px;
    }
    .admin-user {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-weight: 500;
      color: #374151;
    }
    .btn-logout {
      background: #f3f4f6;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
      color: #ef4444;
      font-weight: 600;
    }
    .admin-container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .admin-title {
      font-size: 1.5rem;
      color: #111827;
      margin-bottom: 2rem;
    }
    .table-container {
      background: white;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 1rem;
      border-bottom: 1px solid #e5e7eb;
    }
    th {
      background: #f9fafb;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    
    .btn-action {
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      margin-right: 0.5rem;
    }
    .btn-approve {
      background: #10b981;
      color: white;
    }
    .btn-reject {
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>
  
  <header class="admin-header">
    <img src="LOGO_NUEVO_REMAX_Inmomás_RGB_AZUL-01.png" alt="REMAX Inmomás">
    <div class="admin-user">
      <span id="admin-email-display">Admin</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="admin-container">
    <h1 class="admin-title">Partner Applications Management</h1>
    
    <div class="table-container">
      <table id="applications-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Name</th>
            <th>Agency</th>
            <th>Email</th>
            <th>Country</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="partners-table-body">
          <!-- Rows will be injected here via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Initial Load
    window.onload = function() {
        loadAdminDashboard();
    };
  </script>
</body>
</html>
