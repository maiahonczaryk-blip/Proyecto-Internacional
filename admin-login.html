<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | REMAX Inmomás</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="Globo_CMYK.png">
  <style>
    body {
      background-color: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Outfit', sans-serif;
    }
    .login-container {
      background: white;
      color: #111827;
      padding: 3rem;
      border-radius: 1rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-container img {
      height: 40px;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      color: #374151;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: #f9fafb;
      color: #111827;
      box-sizing: border-box;
    }
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover {
      background: #b91c1c;
    }
    #error-msg {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <img src="LOGO_NUEVO_REMAX_Inmomás_RGB_AZUL-01.png" alt="REMAX Inmomás">
      <h2 style="margin-top: 1rem; font-size: 1.25rem;">Admin Portal</h2>
    </div>
    
    <form id="admin-login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" required placeholder="name@remax.es">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login">Login to Dashboard</button>
      <div id="error-msg">Invalid credentials. Unauthorized access.</div>
    </form>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function handleLogin(e) {
      // Just call loginAdmin from auth.js but since it doesn't check password currently in auth.js,
      // I will implement a quick pass check here or just rely on auth.js
      e.preventDefault();
      const email = document.getElementById('email').value.toLowerCase().trim();
      const password = document.getElementById('password').value;
      
      const allowedEmails = ['maia.honczaryk@remax.es', 'jose.martinez@remax.es'];
      
      if(allowedEmails.includes(email) && password === 'admin123') {
        localStorage.setItem('remax_admin', email);
        window.location.href = 'admin.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
